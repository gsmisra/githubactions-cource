name: CI (self-hosted)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    name: Run on cicd-runner
    runs-on:
      - cicd-runner

    outputs:
      runner-name: ${{ runner.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: repo

      - name: Run a simple command
        shell: bash
        run: |
          echo "Triggered by push to main on $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          echo "Runner: $RUNNER_NAME"
          echo "Repo: $GITHUB_REPOSITORY"
          echo "SHA: $GITHUB_SHA"

      - name: Docker command
        run: docker run ubuntu:22.04 echo "This runs inside Docker"

  deploy:
    name: Deploy on cicd-runner
    runs-on:
      - cicd-runner

    needs: build

    steps:
      - name: Checkout
        run: echo "Deploying on runner: ${{ needs.build.outputs.runner-name }}"
