name: Events demo

on:
  pull_request:
    types: [opened]
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Show event details
        run: |
          echo "Event name: ${{ github.event_name }}"
          echo "Event action: ${{ github.event.action }}"
          echo "Pull request title: ${{ github.event.pull_request.title }}"
